<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Formulário Pessoa Física</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#f7f7f8;
            --card-bg:#ffffff;
            --accent:#c91f1f;
            --muted:#6b6b6b;
            --pill-start:#fff1f1;
            --pill-end:#fff7f7;
            --gap:18px;
            --error:#b00020;
        }

        *{ box-sizing:border-box; }
        html,body{ height:100%; }
        body{
            margin:0;
            background:linear-gradient(180deg,var(--bg),#ffffff);
            font-family: "Inter", Arial, Helvetica, sans-serif;
            color:#222;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:12px;
        }

        /* CARD: ocupa altura proporcional da janela e ajusta automaticamente */
        .card{
            width:100%;
            max-width:960px;
            height: min(92vh, 1100px);
            background:var(--card-bg);
            border-radius:12px;
            box-shadow:0 8px 30px rgba(37,37,37,0.08);
            padding:20px;
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        header{
            display:flex;
            flex-direction:column;
            align-items:flex-start;
            gap:8px;
            margin-bottom:0;
            flex:0 0 auto;
        }
        /* título maior conforme pedido */
        header h1{
            margin:0;
            font-size:clamp(24px,4vw,36px);
            color:var(--accent);
            font-weight:800;
            letter-spacing:0.4px;
        }
        /* subtítulo maior e em itálico */
        header p{
            margin:0;
            color:var(--muted);
            font-size:clamp(14px,2.2vw,18px);
            font-style:italic;
        }

        .form-area{
            display:flex;
            flex:1 1 auto;
            overflow:auto;
            padding-right:6px;
        }

        form{
            width:100%;
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:var(--gap);
            align-items:start;
        }

        .full { grid-column: 1 / -1; }

        label{ display:block; font-size:13px; font-weight:600; color:#7a0b0b; margin-bottom:8px; }

        .input, select {
            width:100%;
            padding: clamp(10px, 1.2vw, 14px);
            border-radius:10px;
            border:1px solid #e9e9e9;
            background: linear-gradient(90deg,var(--pill-start),var(--pill-end));
            font-size: clamp(13px, 1.1vw, 15px);
            outline:none;
        }
        .input:focus, select:focus { box-shadow:0 3px 10px rgba(201,31,31,0.08); border-color: rgba(201,31,31,0.18); }

        .group { display:flex; gap:12px; align-items:flex-start; }
        .group .col { flex:1; min-width:0; }

        .small-input { padding:10px 12px; font-size:14px; }

        .gender-btns{ display:flex; gap:8px; }
        .gender-btn{
            flex:1;
            text-align:center;
            padding:10px 12px;
            border-radius:10px;
            background:linear-gradient(90deg,#ff9494,#ff6b6b);
            color:#fff;
            cursor:pointer;
            user-select:none;
            font-weight:700;
            transition: transform .12s, box-shadow .12s, background .12s;
            border: 2px solid transparent;
            outline-offset: 2px;
        }
        /* destaque claro quando selecionado */
        .gender-btn.active{
            background:linear-gradient(90deg,#1e88e5,#1565c0);
            box-shadow:0 8px 20px rgba(21,101,192,0.18);
            transform:translateY(-4px) scale(1.02);
            border-color: rgba(0,0,0,0.08);
        }

        .actions{ display:flex; justify-content:center; gap:12px; grid-column:1 / -1; margin-top:6px; }
        .btn { padding:12px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:700; }
        .btn-primary{ background:linear-gradient(90deg,var(--accent),#ff5a5a); color:#fff; box-shadow:0 6px 14px rgba(0,0,0,0.12); }

        .note{ font-size:12px; color:var(--muted); text-align:center; }
        .sigilo{ grid-column:1 / -1; text-align:center; color:var(--accent); font-weight:700; font-size:12px; }
        .msg { font-size:12px; margin-top:6px; display:block; color:var(--error); }

        .form-area::-webkit-scrollbar{ width:10px; }
        .form-area::-webkit-scrollbar-thumb{ background: #e0e0e0; border-radius:8px; }

        @media (max-width:880px){
            .card{ padding:16px; height: auto; max-height: 96vh; }
            form{ grid-template-columns: 1fr; gap:12px; }
        }

        .required::after { content: " *"; color: var(--accent); margin-left:2px; font-weight:700; }

        /* texto curto sobre compartilhamento */
        .terms-info{ font-size:13px; color:var(--muted); margin-top:8px; text-align:left; }
        .terms-title{ font-size:18px; font-weight:800; color:var(--accent); text-align:center; margin-bottom:6px; }
    </style>
</head>
<body>
    <div class="card" role="main" aria-label="Formulário de cadastro">
        <header>
            <h1>Formulário — Pessoa Física</h1>
            <p>Preencha com atenção. Campos obrigatórios assinalados por asterisco.</p>
        </header>

        <div class="form-area">
            <form id="form" autocomplete="off">
                <!-- Nome -->
                <div class="full">
                    <label for="nome" class="required">Nome completo</label>
                    <input id="nome" name="nome" class="input" type="text" placeholder="Nome completo" required>
                    <small id="nomeMsg" class="msg" style="display:none"></small>
                </div>

                <!-- CPF / RG (RG obrigatório) -->
                <div>
                    <label for="cpf" class="required">CPF</label>
                    <input id="cpf" name="cpf" class="input" type="text" placeholder="000.000.000-00" autocomplete="off" required inputmode="numeric" pattern="\d*">
                    <small id="cpfMsg" class="msg" style="display:none"></small>
                </div>
                <div>
                    <label for="rg" class="required">RG</label>
                    <input id="rg" name="rg" class="input" type="text" placeholder="RG" required inputmode="numeric" pattern="\d*">
                    <small id="rgMsg" class="msg" style="display:none"></small>
                </div>

                <!-- Data nascimento / Estado Civil -->
                <div>
                    <label for="data_nascimento" class="required">Data de Nascimento</label>
                    <input id="data_nascimento" name="data_nascimento" class="input" type="date" required>
                    <small id="dataMsg" class="msg" style="display:none"></small>
                </div>
                <div>
                    <label for="estado_civil">Estado Civil</label>
                    <select id="estado_civil" name="estado_civil" class="input">
                        <option value="">-- selecione --</option>
                        <option value="Solteiro(a)">Solteiro(a)</option>
                        <option value="Casado(a)">Casado(a)</option>
                        <option value="Divorciado(a)">Divorciado(a)</option>
                        <option value="Viúvo(a)">Viúvo(a)</option>
                        <option value="União Estável">União Estável</option>
                    </select>
                </div>

                <!-- Nome mãe (obrigatório) -->
                <div class="full">
                    <label for="nome_mae" class="required">Nome da mãe</label>
                    <input id="nome_mae" name="nome_mae" class="input" type="text" placeholder="Nome completo da mãe" required>
                    <small id="maeMsg" class="msg" style="display:none"></small>
                </div>

                <!-- Nacionalidade / Naturalidade -->
                <div>
                    <label for="nacionalidade">Nacionalidade</label>
                    <input id="nacionalidade" name="nacionalidade" class="input" list="nacionalidades" placeholder="Ex: Brasileiro(a)">
                    <datalist id="nacionalidades">
                        <option value="Brasileiro(a)"><option value="Português(a)"><option value="EUA / Norte-americano(a)">
                        <option value="Espanhol(a)"><option value="Argentino(a)"><option value="Colombiano(a)">
                        <option value="Chileno(a)"><option value="Peruano(a)"><option value="Outro">
                    </datalist>
                </div>
                <div>
                    <label for="naturalidade">Naturalidade</label>
                    <input id="naturalidade" name="naturalidade" class="input" type="text" placeholder="Cidade - UF">
                </div>

                <!-- Profissão / Renda (texto com formatação) -->
                <div>
                    <label for="profissao">Profissão</label>
                    <input id="profissao" name="profissao" class="input" type="text" placeholder="Profissão">
                </div>
                <div>
                    <label for="renda">Renda</label>
                    <input id="renda" name="renda" class="input" type="text" placeholder="0,00" inputmode="numeric" pattern="[0-9.,]*">
                    <small style="font-size:12px;color:var(--muted);">Digite números; ao sair será formatado (1.234,56).</small>
                </div>

                <!-- Telefones: DDI + número único (inclui DDD). inputmode tel para teclado numérico -->
                <div class="full">
                    <label>Telefones</label>
                    <div class="group" style="margin-top:6px;">
                        <div class="col" style="max-width:140px;">
                            <label for="ddi" style="font-size:12px; color:#7a0b0b; margin-bottom:6px;">DDI</label>
                            <select id="ddi" name="ddi" class="input small-input">
                                <option value="+55">+55 Brasil</option>
                                <option value="+1">+1 EUA/Canadá</option>
                                <option value="+351">+351 Portugal</option>
                                <option value="+44">+44 Reino Unido</option>
                                <option value="">Outro</option>
                            </select>
                        </div>

                        <div class="col" style="max-width:260px;">
                            <label for="celular" class="required" style="margin-bottom:6px;">Celular</label>
                            <input id="celular" name="celular" class="input small-input" type="tel" placeholder="(11) 91234-5678" required inputmode="tel" pattern="[0-9()\- ]+">
                            <small id="celMsg" class="msg" style="display:none"></small>
                        </div>

                        <div class="col" style="max-width:200px;">
                            <label for="residencial" style="font-size:12px; color:#7a0b0b; margin-bottom:6px;">Residencial</label>
                            <input id="residencial" name="residencial" class="input small-input" type="tel" placeholder="(11) 3232-3232" inputmode="tel" pattern="[0-9()\- ]+">
                        </div>
                    </div>
                </div>

                <!-- Ramo escolhido (novo campo antes do gênero) -->
                <div class="full">
                    <label for="ramo">Ramo escolhido / desejado</label>
                    <select id="ramo" name="ramo" class="input">
                        <option value="">-- selecione --</option>
                        <option value="investimento">Investimento</option>
                        <option value="imobiliario">Imobiliário</option>
                        <option value="servicos">Serviços</option>
                        <option value="veicular">Veicular</option>
                    </select>
                </div>

                <!-- CEP / Bairro / Cidade / Estado (CEP obrigatório) -->
                <div>
                    <label for="cep" class="required">CEP</label>
                    <input id="cep" name="cep" class="input" type="text" maxlength="9" placeholder="00000-000" required inputmode="numeric" pattern="\d*">
                    <small id="cepMsg" class="msg" style="display:none"></small>
                </div>

                <div>
                    <label for="bairro">Bairro</label>
                    <input id="bairro" name="bairro" class="input" type="text">
                </div>

                <div>
                    <label for="cidade">Cidade</label>
                    <input id="cidade" name="cidade" class="input" type="text">
                </div>

                <div>
                    <label for="estado">Estado (UF)</label>
                    <input id="estado" name="estado" class="input" type="text" maxlength="2" placeholder="SP">
                </div>

                <!-- Endereço detalhado -->
                <div>
                    <label for="endereco_logradouro">Logradouro</label>
                    <input id="endereco_logradouro" name="endereco_logradouro" class="input" type="text" placeholder="Rua / Av.">
                </div>
                <div>
                    <label for="endereco_numero">Número</label>
                    <input id="endereco_numero" name="endereco_numero" class="input" type="text" placeholder="Ex: 123" inputmode="numeric" pattern="\d*">
                </div>
                <div class="full">
                    <label for="endereco_complemento">Complemento</label>
                    <input id="endereco_complemento" name="endereco_complemento" class="input" type="text" placeholder="Apartamento, bloco, complemento">
                </div>

                <!-- Email (obrigatório Gmail) / Pagamento (obrigatório; cartão removido) -->
                <div>
                    <label for="email" class="required">Email (Gmail)</label>
                    <input id="email" name="email" class="input" type="email" placeholder="exemplo@gmail.com" required>
                    <small id="emailMsg" class="msg" style="display:none"></small>
                </div>
                <div>
                    <label for="pagamento" class="required">Pagamento da 1ª parcela</label>
                    <select id="pagamento" name="pagamento" class="input" required>
                        <option value="">-- selecione --</option>
                        <option value="pix">Pix</option>
                        <option value="boleto">Boleto</option>
                    </select>
                </div>

                <!-- Gênero (removido "Outro") -->
                <div class="full">
                    <label>Gênero</label>
                    <div class="gender-btns" role="radiogroup" aria-label="Gênero">
                        <label class="gender-btn" data-val="Masculino" tabindex="0" role="radio" aria-checked="false">
                            <input type="radio" name="genero" value="Masculino" style="display:none;">Masculino
                        </label>
                        <label class="gender-btn" data-val="Feminino" tabindex="0" role="radio" aria-checked="false">
                            <input type="radio" name="genero" value="Feminino" style="display:none;">Feminino
                        </label>
                    </div>
                </div>

                <!-- Termos: título grande e caixa abaixo -->
                <div class="full">
                    <div class="terms-title">CONCORDO COM OS TERMOS</div>

                    <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
                        <input type="checkbox" id="agree" name="agree" required>
                        <label for="agree" style="font-size:13px;">Autorizo o uso e compartilhamento dos dados necessários com a Admicom para processar o cadastro e faturamento. Dados sensíveis serão tratados com sigilo e usados somente para fins administrativos.</label>
                    </div>
                </div>

                <div class="actions full">
                    <button type="button" id="savePdfBtn" class="btn btn-primary">Salvar em PDF</button>
                </div>

                <div class="sigilo full">SIGILO TOTAL DOS SEUS DADOS</div>
            </form>
        </div>
    </div>

    <div id="pdfContent" style="display:none;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script>
        (function(){
            const form = document.getElementById('form');
            const cpfInput = document.getElementById('cpf');
            const cpfMsg = document.getElementById('cpfMsg');
            const cepInput = document.getElementById('cep');
            const cepMsg = document.getElementById('cepMsg');
            const nomeMsg = document.getElementById('nomeMsg');
            const maeMsg = document.getElementById('maeMsg');
            const rgMsg = document.getElementById('rgMsg');
            const emailMsg = document.getElementById('emailMsg');
            const celMsg = document.getElementById('celMsg');
            const rendaInput = document.getElementById('renda');
            const nacionalidadeInput = document.getElementById('nacionalidade');
            const naturalidadeInput = document.getElementById('naturalidade');
            const celularInput = document.getElementById('celular');
            const residencialInput = document.getElementById('residencial');
            const ddiSelect = document.getElementById('ddi');
            const saveBtn = document.getElementById('savePdfBtn');

            const mockCPFdb = {
                '12345678909': { nome: 'João Silva', data_nascimento: '1985-06-12', nome_mae: 'Maria Silva' },
                '11144477735': { nome: 'Ana Pereira', data_nascimento: '1990-03-22', nome_mae: 'Clara Pereira' }
            };

            function onlyDigits(v){ return String(v||'').replace(/\D/g,''); }

            // Validação CPF (módulo 11)
            function validaCPF(cpf){
                cpf = onlyDigits(cpf);
                if(!cpf || cpf.length !== 11) return false;
                if(/^(\d)\1+$/.test(cpf)) return false;
                const calc = (t) => {
                    let s = 0;
                    for(let i=0;i<t;i++) s += parseInt(cpf.charAt(i)) * ((t+1)-i);
                    let r = 11 - (s % 11);
                    return r >= 10 ? 0 : r;
                };
                return calc(9) === parseInt(cpf.charAt(9)) && calc(10) === parseInt(cpf.charAt(10));
            }

            // Formatar CPF enquanto digita
            cpfInput.addEventListener('input', (e)=>{
                let v = onlyDigits(e.target.value).slice(0,11);
                let out = v;
                if(v.length > 9) out = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, "$1.$2.$3-$4");
                else if(v.length > 6) out = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
                else if(v.length > 3) out = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
                e.target.value = out;
                cpfMsg && (cpfMsg.style.display = 'none');
            });

            cpfInput.addEventListener('blur', ()=>{
                const raw = onlyDigits(cpfInput.value);
                if(!raw) return;
                if(!validaCPF(raw)){
                    cpfMsg.textContent = 'CPF inválido — verifique os dígitos.';
                    cpfMsg.style.display = 'block';
                    return;
                }
                cpfMsg.textContent = 'CPF válido.';
                cpfMsg.style.display = 'block';
                const data = mockCPFdb[raw];
                if(data){
                    if(!form.nome.value) form.nome.value = data.nome;
                    if(!form.data_nascimento.value) form.data_nascimento.value = data.data_nascimento;
                    if(!form.nome_mae.value) form.nome_mae.value = data.nome_mae;
                    cpfMsg.textContent = 'Dados preenchidos (demo).';
                } else {
                    cpfMsg.textContent = 'CPF válido, sem correspondência na base local.';
                }
            });

            // CEP: formatação e ViaCEP
            cepInput.addEventListener('input', (e)=>{
                let v = onlyDigits(e.target.value).slice(0,8);
                if(v.length > 5) v = v.replace(/(\d{5})(\d+)/, '$1-$2');
                e.target.value = v;
                cepMsg && (cepMsg.style.display = 'none');
            });

            cepInput.addEventListener('blur', async ()=>{
                const raw = onlyDigits(cepInput.value);
                if(!raw) return;
                if(raw.length !== 8){
                    cepMsg.textContent = 'CEP deve ter 8 dígitos.';
                    cepMsg.style.display = 'block';
                    return;
                }
                cepMsg.textContent = 'Consultando CEP...';
                cepMsg.style.display = 'block';
                try{
                    const res = await fetch(`https://viacep.com.br/ws/${raw}/json/`);
                    if(!res.ok) throw new Error('Erro na consulta CEP');
                    const data = await res.json();
                    if(data.erro){
                        cepMsg.textContent = 'CEP não encontrado.';
                        return;
                    }
                    if(data.logradouro && !form.endereco_logradouro.value) form.endereco_logradouro.value = data.logradouro;
                    if(data.bairro && !form.bairro.value) form.bairro.value = data.bairro;
                    if(data.localidade && !form.cidade.value) form.cidade.value = data.localidade;
                    if(data.uf && !form.estado.value) form.estado.value = data.uf;
                    cepMsg.textContent = 'CEP preenchido automaticamente.';
                }catch(err){
                    console.error(err);
                    cepMsg.textContent = 'Erro ao consultar CEP.';
                }
            });

            // Formatadores por DDI (mantém formato por país)
            function formatByDDI(ddi, rawDigits){
                if(!rawDigits) return '';
                if(ddi === '+55' || ddi === '55'){
                    const d = rawDigits.slice(-11);
                    const ddd = d.slice(0,2);
                    const rest = d.slice(2);
                    if(!ddd) return rest;
                    if(rest.length <= 4) return `(${ddd}) ${rest}`;
                    if(rest.length === 9) return `(${ddd}) ${rest.slice(0,5)}-${rest.slice(5)}`;
                    if(rest.length >= 8) return `(${ddd}) ${rest.slice(0,4)}-${rest.slice(4)}`;
                    return `(${ddd}) ${rest}`;
                }
                if(ddi === '+1' || ddi === '1'){
                    const d = rawDigits.slice(-10);
                    const area = d.slice(0,3);
                    const rest = d.slice(3);
                    if(!area) return rest;
                    if(rest.length <= 3) return `(${area}) ${rest}`;
                    if(rest.length <= 7) return `(${area}) ${rest.slice(0,3)}-${rest.slice(3)}`;
                    return `(${area}) ${rest.slice(0,3)}-${rest.slice(3,7)}`;
                }
                if(ddi === '+351' || ddi === '351'){
                    const d = rawDigits.slice(-9);
                    if(d.length <= 3) return d;
                    if(d.length <= 6) return `${d.slice(0,3)} ${d.slice(3)}`;
                    return `${d.slice(0,3)} ${d.slice(3,6)} ${d.slice(6)}`;
                }
                const d = rawDigits;
                if(d.length <= 3) return d;
                if(d.length <= 6) return `${d.slice(0,3)} ${d.slice(3)}`;
                if(d.length <= 10) return `${d.slice(0,3)} ${d.slice(3,6)} ${d.slice(6)}`;
                return `${d.slice(0,3)} ${d.slice(3,6)} ${d.slice(6,10)}`;
            }

            function onPhoneInputByDDI(e){
                const el = e.target;
                const raw = onlyDigits(el.value);
                let national = raw;
                const ddiVal = (ddiSelect.value || '').replace('+','');
                if(ddiVal && national.startsWith(ddiVal)) national = national.slice(ddiVal.length);
                el.value = formatByDDI(ddiSelect.value || '', national);
                celMsg && (celMsg.style.display = 'none');
            }

            celularInput.addEventListener('input', onPhoneInputByDDI);
            residencialInput.addEventListener('input', onPhoneInputByDDI);

            ddiSelect.addEventListener('change', ()=>{
                [celularInput,residencialInput].forEach(el=>{
                    const raw = onlyDigits(el.value);
                    const ddiVal = (ddiSelect.value || '').replace('+','');
                    let national = raw;
                    if(ddiVal && national.startsWith(ddiVal)) national = national.slice(ddiVal.length);
                    el.value = formatByDDI(ddiSelect.value || '', national);
                    // adjust inputmode / maxlength hints
                    if(ddiSelect.value === '+55'){ el.setAttribute('inputmode','tel'); el.maxLength = 15; }
                    else if(ddiSelect.value === '+1'){ el.setAttribute('inputmode','tel'); el.maxLength = 14; }
                    else { el.setAttribute('inputmode','tel'); el.removeAttribute('maxLength'); }
                });
            });

            function validaTelefone(){
                const celularDigits = onlyDigits(celularInput.value);
                const ddi = ddiSelect.value || '';
                if(ddi === '+55'){
                    if(!celularDigits || celularDigits.length < 10){ celMsg.textContent = 'Celular obrigatório e deve incluir DDD (ex: (11) 91234-5678).'; celMsg.style.display='block'; return false; }
                } else if(ddi === '+1'){
                    if(!celularDigits || celularDigits.length < 10){ celMsg.textContent = 'Celular obrigatório e deve incluir o código de área (ex: (212) 555-1234).'; celMsg.style.display='block'; return false; }
                } else {
                    if(!celularDigits || celularDigits.length < 6){ celMsg.textContent = 'Celular obrigatório e inválido para o DDI selecionado.'; celMsg.style.display='block'; return false; }
                }
                celMsg.style.display='none';
                return true;
            }

            // Nacionalidade placeholder adaptável
            nacionalidadeInput.addEventListener('input', ()=>{
                const v = (nacionalidadeInput.value || '').toLowerCase();
                if(v.includes('brasil') || v.includes('brasileir')) naturalidadeInput.placeholder = 'Cidade - UF (ex: São Paulo - SP)';
                else naturalidadeInput.placeholder = 'Cidade, País (ex: Lisboa, Portugal)';
            });

            // Renda: limpar ao focar e formatar ao blur (pt-BR)
            const rendaEl = document.getElementById('renda');
            rendaEl && rendaEl.addEventListener('focus', (e)=>{
                const raw = e.target.value || '';
                const only = raw.replace(/\./g,'').replace(',', '.').replace(/[^\d.]/g,'');
                e.target.value = only;
            });
            rendaEl && rendaEl.addEventListener('blur', (e)=>{
                let v = e.target.value || '';
                v = v.replace(/\./g,'').replace(',', '.').replace(/[^\d.]/g,'');
                if(!v) { e.target.value = ''; return; }
                const num = parseFloat(v);
                if(isNaN(num)){ e.target.value = ''; return; }
                e.target.value = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            });

            // Validação de email: exigir Gmail
            function validaEmailGmail(){
                const email = (form.email.value || '').trim();
                if(!email) return false;
                const okFormat = /^\S+@\S+\.\S+$/.test(email);
                const isGmail = /@gmail\.com$/i.test(email);
                if(!okFormat) { emailMsg.textContent = 'Email inválido.'; emailMsg.style.display = 'block'; return false; }
                if(!isGmail) { emailMsg.textContent = 'Use um endereço Gmail (ex: exemplo@gmail.com).'; emailMsg.style.display = 'block'; return false; }
                emailMsg.style.display = 'none';
                return true;
            }

            // Validação completa antes de gerar PDF
            function validateForm(){
                let ok = true;
                if(!form.nome.value.trim()){ nomeMsg.textContent = 'Nome obrigatório.'; nomeMsg.style.display='block'; ok = false; } else nomeMsg.style.display='none';
                if(!form.nome_mae.value.trim()){ maeMsg.textContent = 'Nome da mãe obrigatório.'; maeMsg.style.display='block'; ok = false; } else maeMsg.style.display='none';
                if(!form.rg.value.trim()){ rgMsg.textContent = 'RG obrigatório.'; rgMsg.style.display='block'; ok = false; } else rgMsg.style.display='none';
                const cpfRaw = onlyDigits(form.cpf.value);
                if(!cpfRaw){ cpfMsg.textContent='CPF obrigatório.'; cpfMsg.style.display='block'; ok=false; }
                else if(!validaCPF(cpfRaw)){ cpfMsg.textContent='CPF inválido.'; cpfMsg.style.display='block'; ok=false; }
                else cpfMsg.style.display='none';
                if(!form.data_nascimento.value){ document.getElementById('data_nascimento').focus(); ok=false; }
                if(!validaTelefone()) ok = false;
                const cepRaw = onlyDigits(form.cep.value);
                if(!cepRaw){ cepMsg.textContent='CEP obrigatório.'; cepMsg.style.display='block'; ok=false; }
                else if(cepRaw && cepRaw.length !== 8){ cepMsg.textContent='CEP deve ter 8 dígitos.'; cepMsg.style.display='block'; ok=false; }
                else cepMsg.style.display='none';
                if(!validaEmailGmail()) ok = false;
                if(!form.pagamento.value){ alert('Selecione a forma de pagamento da 1ª parcela.'); ok = false; }
                if(!form.agree.checked){ alert('É necessário concordar com os termos.'); ok = false; }
                return ok;
            }

            // Monta HTML para PDF
            function buildPdfHtml(fd){
                const mapa = [
                    ['nome','Nome'],
                    ['cpf','CPF'],
                    ['rg','RG'],
                    ['data_nascimento','Data de Nascimento'],
                    ['estado_civil','Estado Civil'],
                    ['nome_mae','Nome da Mãe'],
                    ['nacionalidade','Nacionalidade'],
                    ['naturalidade','Naturalidade'],
                    ['profissao','Profissão'],
                    ['renda','Renda'],
                    ['ddi','DDI'],
                    ['celular','Celular'],
                    ['residencial','Residencial'],
                    ['ramo','Ramo escolhido'],
                    ['cep','CEP'],
                    ['endereco_logradouro','Logradouro'],
                    ['endereco_numero','Número'],
                    ['endereco_complemento','Complemento'],
                    ['bairro','Bairro'],
                    ['cidade','Cidade'],
                    ['estado','Estado (UF)'],
                    ['email','Email'],
                    ['pagamento','Pagamento 1ª parcela'],
                    ['genero','Gênero'],
                    ['agree','Concordou com termos']
                ];
                const style = `<style>body{font-family:Arial;padding:18px;color:#111}h1{color:#b00;margin-bottom:8px} .field{margin-bottom:8px}.label{font-weight:700;display:inline-block;width:160px}.value{color:#111}</style>`;
                const rows = mapa.map(([k,l])=>{
                    let v = fd.get(k) || '';
                    if(k==='renda' && v){
                        let num = String(v).replace(/\./g,'').replace(',', '.');
                        num = parseFloat(num);
                        if(!isNaN(num)) v = num.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    }
                    if(k==='agree') v = fd.get('agree') ? 'Sim' : 'Não';
                    return `<div class="field"><span class="label">${l}:</span><span class="value">${escapeHtml(v)}</span></div>`;
                }).join('');
                return style + `<body><h1>Formulário - Pessoa Física</h1>` + rows + `</body>`;
            }
            function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }

            // Save: try showSaveFilePicker when available (mobile/desktop supporting File System Access API),
            // otherwise fallback to html2pdf().save()
            saveBtn.addEventListener('click', async ()=>{
                if(!validateForm()) return;
                const fd = new FormData(form);
                const genero = form.querySelector('input[name="genero"]:checked');
                if(genero) fd.set('genero', genero.value);

                const pdfHtml = buildPdfHtml(fd);
                const container = document.getElementById('pdfContent');
                container.innerHTML = pdfHtml;
                container.style.display = 'block';

                const nome = form.nome.value.trim();
                const safeName = nome.replace(/\s+/g,'_').replace(/[^\w\-]/g,'') || 'form';
                const now = new Date();
                const filename = `${safeName}_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}.pdf`;

                const opt = {
                    margin: 10,
                    filename,
                    image: { type:'jpeg', quality:0.95 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit:'mm', format:'a4', orientation:'portrait' }
                };

                try{
                    const worker = html2pdf().set(opt).from(container);
                    // prefer explicit save location if available
                    if(window.showSaveFilePicker){
                        // create PDF via toPdf/get('pdf') to obtain jsPDF instance and blob
                        const pdfInstance = await worker.toPdf().get('pdf');
                        const blob = pdfInstance.output('blob');
                        try{
                            const handle = await window.showSaveFilePicker({
                                suggestedName: filename,
                                types: [{ description: 'PDF', accept: { 'application/pdf': ['.pdf'] } }]
                            });
                            const writable = await handle.createWritable();
                            await writable.write(blob);
                            await writable.close();
                        }catch(sfErr){
                            // fallback to default save if user cancels or API fails
                            await worker.save();
                        }
                    }else{
                        await worker.save();
                    }
                }catch(err){
                    console.error(err);
                    alert('Erro ao gerar/salvar PDF: ' + (err.message || err));
                }finally{
                    container.style.display = 'none';
                    container.innerHTML = '';
                }
            });

            // gender visual toggle (mais visível) + accessibility attributes
            document.querySelectorAll('.gender-btn').forEach(btnEl=>{
                btnEl.addEventListener('click', ()=>{
                    document.querySelectorAll('.gender-btn').forEach(b=>{
                        b.classList.remove('active');
                        b.setAttribute('aria-checked','false');
                    });
                    btnEl.classList.add('active');
                    btnEl.setAttribute('aria-checked','true');
                    const val = btnEl.getAttribute('data-val');
                    let input = btnEl.querySelector('input[type=radio]');
                    if(!input){
                        input = document.createElement('input');
                        input.type='radio'; input.name='genero'; input.value=val; input.style.display='none';
                        btnEl.appendChild(input);
                    }
                    input.checked = true;
                    // ensure the underlying radios are consistent: uncheck others
                    document.querySelectorAll('input[name="genero"]').forEach(r=>{
                        if(r !== input) r.checked = false;
                    });
                });
                // keyboard support
                btnEl.addEventListener('keydown', (ev)=>{
                    if(ev.key === 'Enter' || ev.key === ' '){
                        ev.preventDefault();
                        btnEl.click();
                    }
                });
            });

            function adjustCardHeight(){
                const card = document.querySelector('.card');
                if(!card) return;
                card.style.height = Math.min(window.innerHeight * 0.92, 1100) + 'px';
            }
            window.addEventListener('resize', adjustCardHeight);
            window.addEventListener('orientationchange', adjustCardHeight);
            adjustCardHeight();
        })();
    </script>
</body>
</html>
